<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background (safe zone for maskable: center 80%) -->
  <rect width="512" height="512" rx="76" fill="#0a1a3a"/>
  <!-- Inner border glow -->
  <rect x="14" y="14" width="484" height="484" rx="62" fill="none" stroke="#2a4a9a" stroke-width="7"/>
  <!-- Card shape -->
  <rect x="76" y="56" width="360" height="400" rx="36" fill="#fdf6e3" stroke="#c0c0c0" stroke-width="3"/>
  <!-- Top-left J♥ -->
  <text x="108" y="140" font-family="Georgia, serif" font-size="88" font-weight="900" fill="#cc0000">J</text>
  <text x="110" y="206" font-family="Georgia, serif" font-size="58" fill="#cc0000">♥</text>
  <!-- Center large heart -->
  <text x="256" y="302" font-family="Georgia, serif" font-size="200" fill="#cc0000" text-anchor="middle" dominant-baseline="middle">♥</text>
  <!-- Bottom-right (rotated) -->
  <text x="402" y="360" font-family="Georgia, serif" font-size="88" font-weight="900" fill="#cc0000" text-anchor="middle" transform="rotate(180,402,360)">J</text>
  <text x="402" y="426" font-family="Georgia, serif" font-size="58" fill="#cc0000" text-anchor="middle" transform="rotate(180,402,426)">♥</text>
  <!-- Gold chip badge -->
  <circle cx="404" cy="416" r="68" fill="#c89a20"/>
  <circle cx="404" cy="416" r="58" fill="#f0c040"/>
  <circle cx="404" cy="416" r="50" fill="none" stroke="#c89a20" stroke-width="4" stroke-dasharray="8,4"/>
  <text x="404" y="408" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#5a3000" text-anchor="middle">JACKS</text>
  <text x="404" y="436" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#5a3000" text-anchor="middle">or BETTER</text>
</svg>
