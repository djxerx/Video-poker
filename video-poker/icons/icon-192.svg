<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="28" fill="#0a1a3a"/>
  <!-- Inner border glow -->
  <rect x="6" y="6" width="180" height="180" rx="22" fill="none" stroke="#2a4a9a" stroke-width="3"/>
  <!-- Card shape -->
  <rect x="30" y="24" width="132" height="144" rx="14" fill="#fdf6e3" stroke="#c0c0c0" stroke-width="1.5"/>
  <!-- Card shadow -->
  <rect x="34" y="28" width="132" height="144" rx="14" fill="rgba(0,0,0,0.2)" transform="translate(2,2)"/>
  <rect x="30" y="24" width="132" height="144" rx="14" fill="#fdf6e3"/>
  <!-- Top-left rank + suit -->
  <text x="44" y="58" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#cc0000">J</text>
  <text x="44" y="82" font-family="Georgia, serif" font-size="22" fill="#cc0000">♥</text>
  <!-- Center large suit -->
  <text x="96" y="118" font-family="Georgia, serif" font-size="72" fill="#cc0000" text-anchor="middle" dominant-baseline="middle">♥</text>
  <!-- Bottom-right rank + suit (rotated) -->
  <text x="148" y="134" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#cc0000" text-anchor="middle" transform="rotate(180,148,134)">J</text>
  <text x="148" y="158" font-family="Georgia, serif" font-size="22" fill="#cc0000" text-anchor="middle" transform="rotate(180,148,158)">♥</text>
  <!-- Gold coin chip overlay bottom right -->
  <circle cx="148" cy="152" r="24" fill="#c89a20"/>
  <circle cx="148" cy="152" r="20" fill="#f0c040"/>
  <text x="148" y="158" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#5a3000" text-anchor="middle">VP</text>
</svg>
